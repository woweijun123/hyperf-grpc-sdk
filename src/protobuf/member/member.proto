syntax = "proto3";
option php_namespace = "GrpcSdk\\Proto\\Member";
option php_metadata_namespace = "GrpcSdk\\GPBMetadata\\Member";

package protobuf.member;

service Member {
  // 根据 member id 查询 member 信息
  rpc Info(MemberIdReq) returns (MemberInfo);
}

//用户ID请求
message MemberIdReq {
  optional uint32 member_id = 1;
  optional bool through_cache = 2;
}

//多个用户id请求
message MemberIdsReq {
  repeated MemberIdReq member_ids = 1;
}
message MemberInfo {
  // member_id。自增的用户唯一标识
  optional uint32 id = 1;
  // 用户 uuid，之前为分表设计，但没有发挥实际作用。未来会下掉的
  optional string uuid = 2;
  // 用户名。即之前的 username
  optional string member_name = 3;
  // 用户账号绑定的手机号
  optional string tel = 4;
  // 注册时间
  optional uint32 created_time = 5;
  // 小程序的 token
  optional string mini_token = 6;
  // 用户上传的头像
  optional string avatar_url = 7;
  // 带盐的密码 hash
  optional string pwd = 12;
}

//多个用户信息
message MembersInfo {
  repeated MemberInfo member_info = 1;
}

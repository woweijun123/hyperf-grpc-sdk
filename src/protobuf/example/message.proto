syntax = "proto3";
option php_namespace = "Proto\\Example";
option php_metadata_namespace = "GPBMetadata\\Example";

//package格式："protobuf.服务目录名称.子目录名称"，禁止使用下划线(包名需和目录名称一致)
package protobuf.example;

import "protobuf/example/user.proto";    //若引用外部proto文件，使用文件包名+文件名;
import "protobuf/member/member.proto";          //若引用外部proto文件，使用文件包名+文件名;

//消息示例
service Message {
  //发送消息示例
  rpc SendMsg (SendMsgReq) returns (SendMsgResp) {}
}

//请求消息结构示例
message SendMsgReq {
  //标题
  optional string title = 1;
  //内容
  optional string context = 2;
  //用户
  optional HiUser user = 3;                //同package引用课省略包前缀
}

//返回消息结构示例
message SendMsgResp{
  //状态code
  optional int32 code = 1;
  //状态内容
  optional int32 msg = 2;
  //示例引用外部结构，若使用跨包名的proto文件数据结构，需要添加包前缀
  optional protobuf.member.MemberInfo member_info = 3;
}



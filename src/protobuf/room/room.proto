syntax = "proto3";
option php_namespace = "GrpcSdk\\Proto\\Room";
option php_metadata_namespace = "GrpcSdk\\GPBMetadata\\Room";

package protobuf.room;

// 房间麦位信息请求
message Mics {
  repeated Mic mic_positions = 1; // 9个麦位信息
}

// 麦位单个节点
message Mic {
  optional int64 user_id = 1;  // 上麦用户id (User ID)
  optional int32 mic_pos = 2;  // 麦位 (Position) 0-8
  optional int32 is_lock_mic = 3; // 是否锁麦 (Lock Status) 0-否 1-是
  optional int32 is_open_mic = 4;  // 开麦状态 (Status) 0-关闭 1-打开
  optional int32 is_forbidden_mic = 5;  // 是否禁麦 (Status) 0-否 1-是
  optional int32 amount = 6; // 贡献钻石 (Money/Medal)
}

// 房间公告请求
message Notification {
  optional string notification = 1; // 通知消息内容
}

// 房间名称请求
message Name {
  optional string name = 1; // 房间名称
}

// 房间背景请求
message Background {
  optional string background_url = 1; // 房间背景
}

// 房间标签请求
message Tags {
  repeated string tags = 1; // 房间标签
}

// 贡献榜请求
message Contributes {
  repeated Contribute contributes = 1; // 3个贡献人
}

// 贡献人信息
message Contribute {
  optional int64 user_id = 1;  // 用户ID
  optional int32 amount = 2; // 贡献钻石 (Money/Medal)
}

// 小时榜请求
message HourlyRank {
  optional int32 hourly_rank = 1; // 小时榜排名
}

// 其他信息
message OtherInfo {
  optional int32 public_screen = 1; // 公屏开关 0:开启 1:关闭
}

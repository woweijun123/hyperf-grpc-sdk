syntax = "proto3";

//格式："proto.服务目录名称.子目录名称"，禁止使用下划线(包名需和目录名称一致)
package proto.example;
// --- PHP 导出配置 ---
option php_namespace = "GrpcSdk\\Proto";
option php_metadata_namespace = "GrpcSdk\\GPBMetadata";

//示例User,和业务member没有关系
service User {
  rpc SayHello (HiUser) returns (HiReply) {}
}

//示例User,和业务member没有关系
message HiUser {
  string name = 1;
  optional int32 sex = 2;
}

message HiReply {
  string message = 1;
  //示例User,和业务member没有关系
  HiUser user = 2;
}

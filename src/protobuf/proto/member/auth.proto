syntax = "proto3";

package proto.member;

// Auth相关接口
service Auth {
  // 根据token获取用户信息并鉴权
  rpc GetMemberInfoByToken (MemberTokenReq) returns (MemberTokenResp);
  // 密码登录
  rpc LoginByTelPwd (LoginByTelPwdReq) returns (LoginResp);
  // 手机号登录或注册
  rpc LoginOrRegisterByTel (LoginOrRegisterByTelReq) returns (LoginResp);
  // UnionId、手机号码登录或注册
  rpc LoginOrRegisterByTelAndUnionId (LoginOrRegisterByTelAndUnionIdReq) returns (LoginResp);
  // 以用户ID退出登录
  rpc LoginOut (LoginOutReq) returns (LoginOutResp);
  // IOS登录或注册
  rpc LoginOrRegisterByIos (LoginByIosReq) returns (LoginResp);
}

// 扩展参数，大部分来源 header
message ExtendData{
  // C 端应用名称
  optional string app_name = 1;
  // 包名称
  optional string app_package_name = 2;
  // 包版本
  optional string app_version = 3;
  // 设备类型
  optional string app_device_type = 4;
  // 设备 UUID
  optional string app_device_uuid = 5;
  // 请求的用户 IP
  optional string client_ip = 6;
  // 旧 system_type
  optional string system_type = 7;
  // 请求的 user_agent
  optional string user_agent = 8;
  // 分享来源
  optional string share_source = 9;
  // 分享来源渠道
  optional string share_channel = 10;
  // 推荐人 id
  optional string refid = 11;
  //厂商设备
  optional string device = 12;
  //厂商渠道token
  optional string channel_token = 13;
  //厂商渠道字符串
  optional string rend_string = 14;
  // 业务线
  optional string business = 15;
  // 前端头部渠道设备信息
  optional string channel = 16;
  // Android设备唯一标识
  optional string oaid = 17;
  // 昵称
  optional string nickname = 18;
  // 头像
  optional string headimgurl = 19;
  // 是否订阅公众号: 0=未订阅, 1=已订阅
  optional uint32 subscribe = 20;
  // 推荐页面
  optional uint32 page_referrer = 21;
  // 设备版本
  optional string device_version = 22;
  // 版本码
  optional string version_code = 23;
  // 分享唯一标识
  optional string track_seed = 24;
}

// 手机号登录或注册，请求数据结构
message LoginOrRegisterByTelReq {
  // 登录或者注册
  optional string tel = 1;
  // 扩展数据，包括登录和注册相关的依赖数据
  optional ExtendData extend_data = 20;
}

// 手机号密码登录，请求数据结构
message LoginByTelPwdReq {
  // 登录手机号
  optional string tel = 1;
  // 登录密码
  optional string password = 2;
  // 扩展数据，包括登录和注册相关的依赖数据
  optional ExtendData extend_data = 20;
}

// UnionId登录或注册，请求数据结构
message LoginOrRegisterByTelAndUnionIdReq {
  // 用户在开放平台的唯一标识符
  optional string unionid = 1;
  // 登录手机号
  optional string tel = 2;
  // 微信 openid
  optional string openid = 3;
  // 扩展数据，包括登录和注册相关的依赖数据
  optional ExtendData extend_data = 20;
}

// token鉴权结构，请求数据结构
message MemberTokenReq {
  // 登录 token
  optional string token = 1;
  // 访问路由
  optional string url_path = 2;
  // 扩展数据，包括登录和注册相关的依赖数据
  optional ExtendData extend_data = 20;
}

// 退出登录，请求数据结构
message LoginOutReq {
  // 用户 ID
  optional uint64 mid = 1;
  // type: 0=退出当前用户, 1=退出指定用户
  optional uint32 type = 2;
  // 扩展数据，包括登录和注册相关的依赖数据
  optional ExtendData extend_data = 20;
}

// IOS登录注册，请求数据结构
message LoginByIosReq {
  // 苹果UUID
  optional string ios_uuid = 1;
  // 类型: 1 = IOS登录不需要绑定手机号, 2 = IOS登录需要绑定手机号
  optional uint32 type = 2;
  // 登录手机号
  optional string tel = 3;
  // 验证码
  optional string code = 4;
  // 用于验证签名
  optional string base_token = 5;
  // 用于验证签名
  optional string base_string = 6;
  // 扩展数据，包括登录和注册相关的依赖数据
  optional ExtendData extend_data = 20;
}

// 登录，返回数据结构
message LoginResp {
  // 错误码
  optional LoginStatus status = 1;
  // 错误文本
  optional string msg = 2;
  // 是否为产商注册包 1=是，0=否
  optional string origin = 3;
  // 是否为新注册：1-是，0-否。
  optional string is_register = 4;
  // 登录 token
  optional string token = 5;
}

// token 获取信息，返回数据结构
message MemberTokenResp {
  // 错误码，错误码这里对应多个错误不确定，需要传输字符串
  optional string code = 1;
  // 错误文本
  optional string msg = 2;
  // 用户 ID
  optional uint32 mid = 3;
}

// 退出登录，返回数据结构
message LoginOutResp {
  // 错误码，错误码这里对应多个错误不确定，需要传输字符串
  optional LoginOutStatus status = 1;
  // 返回信息
  optional string msg = 2;
}

// 返回状态码类型
enum LoginOutStatus {
  // 未知的
  LOGIN_OUT_STATUS_UNSPECIFIED = 0;
  // 退出登录成功
  LOGIN_OUT_STATUS_SUCCESS = 1;
  // 退出登录失败
  LOGIN_OUT_STATUS_FAIL = 5;
}

// 返回状态码类型
enum LoginStatus {
  // 未知的
  LOGIN_STATUS_UNSPECIFIED = 0;
  // 登录成功
  LOGIN_STATUS_SUCCESS = 1;
  // 手机未注册
  LOGIN_STATUS_TEL_NOT_EXIST = 2;
  // 密码错误
  LOGIN_STATUS_PWD_ERROR = 3;
  // 注册失败
  LOGIN_STATUS_REGISTER_ERROR = 4;
  // 绑定手机号
  LOGIN_STATUS_BING_TEL = 5;
  // 失败
  LOGIN_STATUS_FAIL = 10;
}
